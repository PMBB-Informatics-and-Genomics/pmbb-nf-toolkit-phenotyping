# community/advanced_diagnostics.yaml
#
# Advanced diagnostic phenotype definitions for use with pmbb-nf-toolkit-phenotyping.
# These are biobank-agnostic ICD-10 case/control definitions with no file paths.
#
# Sources:
#   - Penn Medicine BioBank (PMBB): obstetric, cardiometabolic, and other conditions
#     validated in EHR data from the University of Pennsylvania Health System
#   - BraVa (Backman et al. 2021, Nature): ~200 UK Biobank exome-wide phenotypes
#     https://doi.org/10.1038/s41586-021-04103-z
#
# Usage:
#   Copy phenotype entries into your biobank config's phenotypes: section.
#   Requires a diagnostic phenotype named "ICD10" already defined in your config
#   (see examples/ for templates).
#
#   phenotypes:
#     ICD10:
#       concept: diagnostic
#       table: /path/to/your/icd10.tsv
#       value_col: condition_source_value
#     # paste entries from this file below:
#     T2Diab:
#       concept: advanced_diagnostic
#       ...
#
# Code format:
#   Bare codes (no dot, e.g. E11) are prefix-matched: E11 → E11.0, E11.1, etc.
#   Dotted codes (e.g. E11.65) are exact matches.

phenotypes:
  PretermBirth:
    concept: advanced_diagnostic
    missing_as_control: false
    sources:
      ICD10:
        from_phenotype: ICD10
        case_codes: [O09.21, O42.01, O42.11, O42.91, O60.1, Z87.51]
  
